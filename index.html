<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AnotPanda</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#e2bd98;
    color:white;
    height:100vh;
    display:flex;
}

/* SIDEBAR */

.sidebar{
    width:85px;
    background:#704d37;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 10px;
    gap:20px;
    border-right:1px solid rgba(189, 182, 182, 0.1);
}

/* MENU */

.dropdown{
    position:relative;
}

.dropbtn{
    width:50px;
    height:50px;
    border:none;
    border-radius:15px;
    background:#e2bd98;
    color:white;
    font-size:24px;
    cursor:pointer;
    transition:0.3s;
}

.dropbtn:hover{
    background:#704d37;
}

/* MENU ABERTO */

.dropdown-content{
    display:none;
    position:absolute;
    left:70px;
    top:0;
    background:#e2bd98;
    min-width:180px;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
    z-index:100;
}

.dropdown-content a{
    display:block;
    padding:15px;
    color:white;
    text-decoration:none;
    transition:0.3s;
}

.dropdown-content a:hover{
    background:#805430;
}

.show{
    display:block;
}

/* CONTAINER */

.container{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* TOPO */

.topbar{
    height:80px;
    background:#6b4a36;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 25px;
    border-bottom:1px solid #e2bd98;
}

/* LOGO */

.logo{
    font-size:24px;
    font-family:cursive;
    font-weight:bold;
}

/* PESQUISA */

.search{
    flex:1;
    display:flex;
    justify-content:center;
}

.search input{
    width:60%;
    max-width:500px;
    padding:12px 20px;
    border:none;
    border-radius:15px;
    background:#e2bd98;
    color:white;
    outline:none;
    font-size:15px;
}

.search input::placeholder{
    color:#ffffff;
}

/* PERFIL */

.profile{
    width:45px;
    height:45px;
    border-radius:50%;
    background:#e2bd98;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    cursor:pointer;
    overflow:hidden;
    position:relative;
}

/* FOTO */

.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
}

/* LETRA */

.profile span{
    position:absolute;
    color:white;
    font-size:18px;
}

/* MAIN */

.main{
    flex:1;
    padding:30px;
    overflow:auto;
}

/* BANNER */

.banner{
    margin-bottom:30px;
    background-image:url("banner.png");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    width:100%;
    height:300px;
    border-radius:15px;
}

/* BLOCOS */

.notes{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

/* CARD */

.card{
    background:#6b4a36;
    padding:20px;
    border-radius:20px;
    min-height:180px;
    transition:0.3s;
    cursor:pointer;
    position:relative;
}

.card:hover{
    transform:translateY(-5px);
    background:#ddbd9c;
}

.card h2{
    margin-bottom:10px;
}

.card p{
    color:#cbd5e1;
    font-size:14px;
}

/* BOTÃO REMOVER */

.delete-btn{
    background:#ef4444;
    border:none;
    color:white;
    width:30px;
    height:30px;
    border-radius:10px;
    cursor:pointer;
    float:right;
    margin-bottom:10px;
    transition:0.3s;
}

.delete-btn:hover{
    background:#dc2626;
    transform:scale(1.05);
}

/* BOTÃO + */

.add{
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:50px;
    color:#94a3b8;
}

.add:hover{
    color:white;
}

</style>
</head>
<body>

<!-- SIDEBAR -->

<div class="sidebar">

    <div class="dropdown">

        <button onclick="toggleMenu()" class="dropbtn">
            ☰
        </button>

        <div id="menu" class="dropdown-content">

            <a href="https://manu140510.github.io/bnconta/">Início</a>

            <a href="https://manu140510.github.io/bninicial/">Sair</a>

        </div>

    </div>

</div>

<!-- CONTAINER -->

<div class="container">

    <!-- TOPO -->

    <div class="topbar">

        <div class="logo">
            AnotPanda
        </div>

        <!-- PESQUISA -->

        <div class="search">

            <input 
            type="text"
            id="searchInput"
            placeholder="Pesquisar bloco..."
            onkeyup="searchCards()"
            >

        </div>

        <!-- PERFIL -->

        <div style="display:flex;align-items:center;gap:12px;">

            <span id="profileName" style="font-weight:bold;">
                Usuário
            </span>

            <div class="profile" onclick="document.getElementById('uploadProfile').click()">

                <img id="profileImage" src="" alt="">

                <span id="profileLetter">U</span>

                <input 
                type="file" 
                id="uploadProfile" 
                accept="image/png, image/jpeg"
                onchange="changeProfile(event)"
                hidden>

            </div>

        </div>

    </div>

    <!-- MAIN -->

    <div class="main">

        <div class="banner"></div>

        <!-- BLOCOS -->

        <div class="notes" id="notesContainer">

            <!-- BOTÃO + -->

            <div class="card add" onclick="addCard()">
                +
            </div>

        </div>

    </div>

</div>

<script>

/* MENU */

function toggleMenu(){

    document
    .getElementById("menu")
    .classList
    .toggle("show");

}

/* FECHAR MENU */

window.onclick = function(event){

    if(!event.target.matches('.dropbtn')){

        let menu = document.getElementById("menu");

        if(menu.classList.contains('show')){

            menu.classList.remove('show');

        }

    }

}

/* ABRIR LINK */

function openBlock(){

    window.location.href = "https://manu140510.github.io/blocodenotas/";

}

/* SALVAR BLOCOS */

function saveCards(){

    let cards = [];

    document.querySelectorAll(".card").forEach(card => {

        if(card.classList.contains("add")){
            return;
        }

        let title = card.querySelector("h2").innerText;
        let text = card.querySelector("p").innerText;

        cards.push({
            title:title,
            text:text
        });

    });

    localStorage.setItem("cards", JSON.stringify(cards));

}

/* CRIAR CARD */

function createCard(title, text){

    let card = document.createElement("div");

    card.classList.add("card");

    card.onclick = openBlock;

    card.innerHTML = `

        <button class="delete-btn" onclick="removeCard(event,this)">
            ✖
        </button>

        <h2>${title}</h2>

        <p>${text}</p>

    `;

    let container = document.getElementById("notesContainer");

    let addButton = document.querySelector(".add");

    container.insertBefore(card, addButton);

}

/* ADICIONAR BLOCO */

function addCard(){

    let title = prompt("Nome do bloco:");

    if(title == null || title == ""){
        return;
    }

    let text = prompt("Descrição do bloco:");

    createCard(title, text);

    saveCards();

}

/* REMOVER BLOCO */

function removeCard(event, button){

    event.stopPropagation();

    button.parentElement.remove();

    saveCards();

}

/* PESQUISA */

function searchCards(){

    let input = document
    .getElementById("searchInput")
    .value
    .toLowerCase();

    let cards = document.querySelectorAll(".card");

    cards.forEach(function(card){

        if(card.classList.contains("add")){
            return;
        }

        let text = card.innerText.toLowerCase();

        if(text.includes(input)){

            card.style.display = "block";

        }else{

            card.style.display = "none";

        }

    });

}

/* FOTO DE PERFIL */

function changeProfile(event){

    let file = event.target.files[0];

    if(file){

        let reader = new FileReader();

        reader.onload = function(e){

            let img = document.getElementById("profileImage");

            img.src = e.target.result;

            img.style.display = "block";

            document.getElementById("profileLetter").style.display = "none";

            localStorage.setItem("profileImage", e.target.result);

        }

        reader.readAsDataURL(file);

    }

}

/* CARREGAR PERFIL E BLOCOS */

window.onload = function(){

    /* NOME */

    let userName = localStorage.getItem("userName");

    if(!userName){

        userName = prompt("Digite seu nome:");

        if(userName){

            localStorage.setItem("userName", userName);

        }else{

            userName = "Usuário";

        }

    }

    document.getElementById("profileName").innerText = userName;

    document.getElementById("profileLetter").innerText =
    userName.charAt(0).toUpperCase();

    /* FOTO */

    let savedImage = localStorage.getItem("profileImage");

    if(savedImage){

        let img = document.getElementById("profileImage");

        img.src = savedImage;

        img.style.display = "block";

        document.getElementById("profileLetter").style.display = "none";

    }

    /* CARREGAR BLOCOS */

    let savedCards = localStorage.getItem("cards");

    if(savedCards){

        let cards = JSON.parse(savedCards);

        cards.forEach(card => {

            createCard(card.title, card.text);

        });

    }

}

</script>

</body>
</html>
